<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 图片加工</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--border:#1a4a7a;--accent:#533483;--text:#e0e0e0;--text2:#888;--blue:#0078d4;--red:#f44336;--orange:#ff9800}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none}
.topbar{display:flex;align-items:center;gap:4px;padding:5px 8px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;z-index:20}
.topbar button{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;cursor:pointer;font-size:11px;white-space:nowrap}
.topbar button:hover{background:#1a4a7a}
.topbar .sep{width:1px;height:18px;background:#333;margin:0 2px}
.topbar label{font-size:10px;color:var(--text2)}
.topbar input[type=color]{width:28px;height:22px;border:1px solid #333;border-radius:3px;background:none;cursor:pointer;padding:0}
.topbar input[type=range]{width:60px;height:4px}
.topbar input[type=number]{width:40px;background:#0a0a1a;color:var(--text);border:1px solid #333;border-radius:3px;padding:2px;font-size:11px}
.topbar select{background:#0a0a1a;color:var(--text);border:1px solid #333;border-radius:3px;padding:2px;font-size:11px}
.main{flex:1;display:flex;overflow:hidden}
.leftbar{width:40px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1px;padding:4px 0;align-items:center;overflow-y:auto}
.leftbar button{width:34px;height:34px;border:none;background:none;color:var(--text2);font-size:15px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.leftbar button:hover{background:var(--bg3);color:var(--text)}
.leftbar button.active{background:var(--accent);color:#fff}
.leftbar .sep{width:26px;height:1px;background:#333;margin:3px 0}
.leftbar .tip{position:absolute;left:42px;background:#000;padding:2px 6px;border-radius:3px;font-size:10px;white-space:nowrap;display:none;z-index:100;border:1px solid #333}
.leftbar button:hover .tip{display:block}
.canvas-area{flex:1;position:relative;overflow:hidden;background:#0d0d1a}
#canvasBg{position:absolute;inset:0;background-image:linear-gradient(45deg,#151530 25%,transparent 25%),linear-gradient(-45deg,#151530 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#151530 75%),linear-gradient(-45deg,transparent 75%,#151530 75%);background-size:20px 20px}
#mainCanvas{position:absolute;transform-origin:0 0}
#overlayCanvas{position:absolute;pointer-events:none;transform-origin:0 0}
#zoomPill{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);color:#aaa;padding:2px 8px;border-radius:3px;font-size:10px;z-index:10;pointer-events:none}
.rightbar{width:220px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rightbar .section{border-bottom:1px solid var(--border);padding:6px 8px}
.rightbar .section h3{font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase}
.rightbar .row{display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap}
.rightbar label{font-size:9px;color:var(--text2);min-width:40px}
.rightbar input[type=range]{flex:1;min-width:40px;height:3px}
.rightbar input[type=number]{width:40px;background:#0a0a1a;color:var(--text);border:1px solid #333;border-radius:2px;padding:1px 3px;font-size:10px}
.rightbar select{background:#0a0a1a;color:var(--text);border:1px solid #333;border-radius:2px;padding:1px 3px;font-size:10px}
.rightbar .val{font-size:9px;color:var(--text);min-width:20px;text-align:right}
.rightbar button{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:2px;cursor:pointer;font-size:10px}
.rightbar button:hover{background:#1a4a7a}
.rightbar button.primary{background:var(--accent)}
.rightbar .scroll{overflow-y:auto;flex:1}
.layer-item{display:flex;align-items:center;gap:3px;padding:3px;border-radius:3px;cursor:pointer;font-size:10px}
.layer-item:hover{background:var(--bg3)}
.layer-item.active{background:var(--accent)}
.layer-item canvas{width:28px;height:28px;border:1px solid #333;border-radius:2px;flex-shrink:0;background:#222}
.layer-item .ln{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .vis{cursor:pointer;font-size:14px;width:20px;text-align:center}
.statusbar{padding:2px 8px;font-size:10px;color:var(--text2);background:var(--bg2);border-top:1px solid var(--border)}
.text-input{position:absolute;z-index:50;background:rgba(0,0,0,0.8);border:1px solid var(--blue);color:#fff;outline:none;font-size:14px;padding:2px 4px;display:none}
</style>
</head>
<body>
<div class="topbar">
  <button onclick="loadImage()">📁打开</button>
  <button onclick="resetAll()">↩️重置</button>
  <button onclick="saveImage()" style="background:var(--accent)">💾保存</button>
  <div class="sep"></div>
  <button onclick="undo()">↩️</button><button onclick="redo()">↪️</button>
  <div class="sep"></div>
  <label>色</label><input type="color" id="fgColor" value="#ff0000">
  <label>大小</label><input type="range" id="brushSize" min="1" max="300" value="20" oninput="document.getElementById('bsVal').textContent=this.value"><span style="font-size:9px;width:20px" id="bsVal">20</span>
  <label>硬度</label><input type="range" id="brushHardness" min="0" max="100" value="80" oninput="document.getElementById('bhVal').textContent=this.value+'%'"><span style="font-size:9px;width:24px" id="bhVal">80%</span>
  <label>透明</label><input type="range" id="brushOpacity" min="0" max="100" value="100" oninput="document.getElementById('boVal').textContent=this.value+'%'"><span style="font-size:9px;width:24px" id="boVal">100%</span>
  <div class="sep"></div>
  <button onclick="doInpaint()">✨去水印</button>
  <select id="inpaintAlg"><option value="TELEA">快速</option><option value="NS">精细</option></select>
  <div class="sep"></div>
  <button onclick="fitCanvas()">📐适应</button><button onclick="setActual()">1:1</button>
</div>
<div class="main">
  <div class="leftbar" id="leftbar"></div>
  <div class="canvas-area" id="viewport">
    <div id="canvasBg"></div>
    <canvas id="mainCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <input type="text" class="text-input" id="textInput" onkeydown="if(event.key==='Enter')commitText()" onblur="commitText()">
    <div id="zoomPill">100%</div>
  </div>
  <div class="rightbar">
    <div class="section">
      <h3>📊 调整 <span id="adjustScope" style="color:var(--orange);font-size:9px">（全图）</span></h3>
      <div class="row"><label>亮度</label><input type="range" id="brightness" min="-100" max="100" value="0" oninput="document.getElementById('brVal').textContent=this.value;previewAdjust()"><span class="val" id="brVal">0</span></div>
      <div class="row"><label>对比度</label><input type="range" id="contrast" min="-100" max="100" value="0" oninput="document.getElementById('ctVal').textContent=this.value;previewAdjust()"><span class="val" id="ctVal">0</span></div>
      <div class="row"><label>色相</label><input type="range" id="hue" min="-180" max="180" value="0" oninput="document.getElementById('huVal').textContent=this.value;previewAdjust()"><span class="val" id="huVal">0</span></div>
      <div class="row"><label>饱和度</label><input type="range" id="saturate" min="-100" max="100" value="0" oninput="document.getElementById('saVal').textContent=this.value;previewAdjust()"><span class="val" id="saVal">0</span></div>
      <div class="row"><button onclick="applyAdjust()" class="primary" style="flex:1">✅应用</button><button onclick="resetAdjust()">重置</button></div>
    </div>
    <div class="section">
      <h3>📈 色阶</h3>
      <div class="row"><label>黑场</label><input type="range" id="levelBlack" min="0" max="254" value="0" oninput="document.getElementById('lbVal').textContent=this.value;previewLevels()"><span class="val" id="lbVal">0</span></div>
      <div class="row"><label>灰点</label><input type="range" id="levelMid" min="1" max="254" value="128" oninput="document.getElementById('lmVal').textContent=this.value;previewLevels()"><span class="val" id="lmVal">128</span></div>
      <div class="row"><label>白场</label><input type="range" id="levelWhite" min="1" max="255" value="255" oninput="document.getElementById('lwVal').textContent=this.value;previewLevels()"><span class="val" id="lwVal">255</span></div>
      <div class="row"><button onclick="applyLevels()" class="primary" style="flex:1">✅应用</button><button onclick="resetLevels()">重置</button></div>
    </div>
    <div class="section">
      <h3>📐 图像大小</h3>
      <div class="row"><label>宽</label><input type="number" id="resizeW" value="0" oninput="onResizeW()"><span style="font-size:9px">px</span></div>
      <div class="row"><label>高</label><input type="number" id="resizeH" value="0" oninput="onResizeH()"><span style="font-size:9px">px</span></div>
      <div class="row"><label>🔗</label><input type="checkbox" id="linkAspect" checked><span style="font-size:9px">锁定比例</span><button onclick="applyResize()" class="primary" style="margin-left:auto">应用</button></div>
    </div>
    <div class="section">
      <h3>⚡ 快速</h3>
      <div class="row"><button onclick="doGray()" style="flex:1">⚫灰度</button><button onclick="doBlur()" style="flex:1">🌫模糊</button></div>
    </div>
    <div class="section" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <h3>🗂️ 图层</h3>
      <div class="row" style="margin-bottom:4px">
        <select id="blendMode" onchange="onBlendChange()" style="flex:1">
          <option value="source-over">正常</option><option value="multiply">正片叠底</option><option value="screen">滤色</option>
          <option value="overlay">叠加</option><option value="darken">变暗</option><option value="lighten">变亮</option>
          <option value="color-dodge">颜色减淡</option><option value="color-burn">颜色加深</option><option value="hard-light">强光</option>
          <option value="soft-light">柔光</option><option value="difference">差值</option><option value="exclusion">排除</option>
          <option value="hue">色相</option><option value="saturation">饱和度</option><option value="color">颜色</option><option value="luminosity">明度</option>
        </select>
        <label>透明</label><input type="range" id="layerOpacity" min="0" max="100" value="100" oninput="onLayerOpacity()" style="width:50px"><span class="val" id="loVal">100</span>
      </div>
      <div class="row"><button onclick="addLayer()" style="flex:1">➕新建</button><button onclick="duplicateLayer()">📋复制</button><button onclick="deleteLayer()">🗑️</button></div>
      <div id="layerList" class="scroll" style="margin-top:4px"></div>
    </div>
  </div>
</div>
<div class="statusbar" id="statusbar">就绪</div>
<script src="图片加工工具.js"></script>
</body>
</html>
