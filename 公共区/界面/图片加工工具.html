<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖼️ 图片加工</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-wrap:wrap}
.toolbar button{background:#0f3460;border:1px solid #1a4a7a;color:#e0e0e0;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;white-space:nowrap}
.toolbar button:hover{background:#1a4a7a}
.toolbar button.active{background:#533483;border-color:#7b5ea7}
.toolbar .sep{width:1px;height:24px;background:#333;margin:0 4px}
.toolbar input[type=range]{width:80px}
.toolbar input[type=number]{width:60px;background:#0a0a1a;color:#e0e0e0;border:1px solid #333;border-radius:3px;padding:3px 6px;font-size:12px}
.toolbar select{background:#0a0a1a;color:#e0e0e0;border:1px solid #333;border-radius:3px;padding:3px 6px;font-size:12px}
.toolbar label{font-size:11px;color:#888;white-space:nowrap}
#viewport{flex:1;position:relative;overflow:hidden;background:#0d0d1a}
#canvasBg{position:absolute;inset:0;background-image:linear-gradient(45deg,#1a1a2e 25%,transparent 25%),linear-gradient(-45deg,#1a1a2e 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a1a2e 75%),linear-gradient(-45deg,transparent 75%,#1a1a2e 75%);background-size:20px 20px;opacity:0.3}
#mainCanvas{position:absolute;image-rendering:pixelated;transform-origin:0 0}
#maskCanvas{position:absolute;pointer-events:none;opacity:0.5;transform-origin:0 0}
#overlayCanvas{position:absolute;pointer-events:none;transform-origin:0 0}
#brushCursor{position:absolute;border:2px solid #f44;border-radius:50%;pointer-events:none;z-index:10;display:none;box-shadow:0 0 0 1px #fff}
.hint{padding:4px 12px;font-size:11px;color:#666;background:#16213e;border-bottom:1px solid #0f3460}
#zoomPill{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.7);color:#aaa;padding:2px 8px;border-radius:3px;font-size:11px;z-index:20;pointer-events:none}
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="loadImage()" title="上传图片">📁 打开</button>
  <button onclick="resetImage()" title="重置为原图">↩️ 重置</button>
  <button onclick="downloadResult()" title="下载结果">⬇️ 下载</button>
  <div class="sep"></div>

  <button onclick="setMode('inpaint')" class="active" id="mode-inpaint" title="涂抹要去除的区域">🧹 涂抹</button>
  <button onclick="setMode('rect')" id="mode-rect" title="矩形选取要去除的区域">▭ 框选</button>
  <button onclick="setMode('none')" id="mode-none" title="平移视图">✋ 平移</button>
  <div class="sep"></div>

  <label>笔刷</label>
  <input type="range" id="brushSize" min="5" max="100" value="30" oninput="document.getElementById('brushVal').textContent=this.value">
  <span id="brushVal" style="font-size:11px;width:24px">30</span>
  <label>算法</label>
  <select id="inpaintAlg">
    <option value="TELEA">TELEA(快速)</option>
    <option value="NS">NS(精细)</option>
  </select>
  <label>半径</label>
  <input type="number" id="inpaintRadius" value="3" min="1" max="20" style="width:40px">
  <button onclick="doInpaint()" title="执行去水印/去杂物">✨ 去除</button>
  <div class="sep"></div>

  <label>亮度</label>
  <input type="range" id="brightness" min="-100" max="100" value="0" oninput="document.getElementById('brightVal').textContent=this.value;previewAdjust()">
  <span id="brightVal" style="font-size:11px;width:24px">0</span>
  <label>对比度</label>
  <input type="range" id="contrast" min="-100" max="100" value="0" oninput="document.getElementById('contrastVal').textContent=this.value;previewAdjust()">
  <span id="contrastVal" style="font-size:11px;width:24px">0</span>
  <button onclick="applyAdjust()" title="应用亮度对比度">应用</button>
  <div class="sep"></div>

  <button onclick="doGray()">⚫ 灰度</button>
  <button onclick="doBlur()">🌫️ 模糊</button>
  <label>旋转</label>
  <input type="number" id="rotateAngle" value="90" style="width:40px">
  <button onclick="doRotate()">🔄 旋转</button>
  <div class="sep"></div>

  <button onclick="undo()" title="撤销 Ctrl+Z">↩️ 撤销</button>
  <button onclick="redo()" title="重做 Ctrl+Y">↪️ 重做</button>
  <button onclick="fitCanvas()" title="适应窗口">📐 适应</button>
  <button onclick="setActual()" title="100%实际大小">1:1</button>
</div>

<div class="hint" id="hintInfo">点击 📁 打开 上传图片 · 滚轮缩放 · 中键/右键拖拽平移</div>
<div id="viewport">
  <div id="canvasBg"></div>
  <canvas id="mainCanvas"></canvas>
  <canvas id="maskCanvas"></canvas>
  <canvas id="overlayCanvas"></canvas>
  <div id="brushCursor"></div>
  <div id="zoomPill">100%</div>
</div>

<script>
// ═══════════════════════════════════════
//  状态
// ═══════════════════════════════════════
let mode = 'inpaint';
let isDrawing = false;
let isPanning = false;
let hasMask = false;
let lastX = 0, lastY = 0;
let panStartX = 0, panStartY = 0;
let scale = 1, offsetX = 0, offsetY = 0;

let canvas = document.getElementById('mainCanvas');
let ctx = canvas.getContext('2d');
let maskCanvas = document.getElementById('maskCanvas');
let maskCtx = maskCanvas.getContext('2d');
let overlayCanvas = document.getElementById('overlayCanvas');
let overlayCtx = overlayCanvas.getContext('2d');
let brushCursor = document.getElementById('brushCursor');
let viewport = document.getElementById('viewport');

let originalImageData = null;
let history = [];
let historyIdx = -1;
let imgPath = null;

// 矩形框选
let rectDrawing = false;
let rectStart = null;
let rectEnd = null;

// ═══════════════════════════════════════
//  加载图片
// ═══════════════════════════════════════
function loadImage() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => setImage(img, file.name);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function setImage(img, name) {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  maskCanvas.width = img.width;
  maskCanvas.height = img.height;
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
  overlayCanvas.width = img.width;
  overlayCanvas.height = img.height;
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  hasMask = false;
  history = [];
  historyIdx = -1;
  pushHistory();
  fitCanvas();
  document.getElementById('hintInfo').textContent = `${name}  ${img.width}×${img.height} · 滚轮缩放 · 中键/右键拖拽平移`;
}

function resetImage() {
  if (!originalImageData) return;
  ctx.putImageData(originalImageData, 0, 0);
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  hasMask = false;
  pushHistory();
  document.getElementById('hintInfo').textContent = '已重置为原图';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('mode-' + m);
  if (btn) btn.classList.add('active');
  canvas.style.cursor = m === 'none' ? 'grab' : 'crosshair';
  // 切换模式时清除矩形选区
  if (m !== 'rect') {
    rectStart = null; rectEnd = null;
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  }
}

// ═══════════════════════════════════════
//  视图变换 (缩放/平移)
// ═══════════════════════════════════════
function applyTransform() {
  const t = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  canvas.style.transform = t;
  maskCanvas.style.transform = t;
  overlayCanvas.style.transform = t;
  document.getElementById('zoomPill').textContent = Math.round(scale * 100) + '%';
  updateBrushCursorSize();
}

function fitCanvas() {
  if (!canvas.width) return;
  const vw = viewport.clientWidth - 40;
  const vh = viewport.clientHeight - 40;
  scale = Math.min(vw / canvas.width, vh / canvas.height, 1);
  offsetX = (viewport.clientWidth - canvas.width * scale) / 2;
  offsetY = (viewport.clientHeight - canvas.height * scale) / 2;
  applyTransform();
}

function setActual() {
  scale = 1;
  offsetX = (viewport.clientWidth - canvas.width) / 2;
  offsetY = (viewport.clientHeight - canvas.height) / 2;
  applyTransform();
}

// 屏幕坐标 → 画布坐标
function screenToCanvas(e) {
  const rect = viewport.getBoundingClientRect();
  const sx = (e.clientX - rect.left - offsetX) / scale;
  const sy = (e.clientY - rect.top - offsetY) / scale;
  return { x: sx, y: sy };
}

// ═══════════════════════════════════════
//  滚轮缩放
// ═══════════════════════════════════════
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.05, Math.min(40, scale * delta));
  // 缩放以鼠标为中心
  offsetX = mx - (mx - offsetX) * (newScale / scale);
  offsetY = my - (my - offsetY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// ═══════════════════════════════════════
//  鼠标交互
// ═══════════════════════════════════════
viewport.addEventListener('mousedown', e => {
  const p = screenToCanvas(e);

  // 中键或右键 = 平移
  if (e.button === 1 || e.button === 2) {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    viewport.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }

  // 平移模式
  if (mode === 'none' && e.button === 0) {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    viewport.style.cursor = 'grabbing';
    return;
  }

  // 涂抹模式
  if (mode === 'inpaint' && e.button === 0) {
    isDrawing = true;
    lastX = p.x; lastY = p.y;
    drawMask(p.x, p.y);
    return;
  }

  // 矩形框选模式
  if (mode === 'rect' && e.button === 0) {
    rectDrawing = true;
    rectStart = { x: p.x, y: p.y };
    rectEnd = { x: p.x, y: p.y };
    return;
  }
});

viewport.addEventListener('mousemove', e => {
  // 更新笔刷光标
  if (mode === 'inpaint') {
    const rect = viewport.getBoundingClientRect();
    const size = parseInt(document.getElementById('brushSize').value) * scale;
    brushCursor.style.display = 'block';
    brushCursor.style.left = (e.clientX - rect.left - size/2) + 'px';
    brushCursor.style.top = (e.clientY - rect.top - size/2) + 'px';
    brushCursor.style.width = size + 'px';
    brushCursor.style.height = size + 'px';
  } else {
    brushCursor.style.display = 'none';
  }

  // 平移
  if (isPanning) {
    offsetX += e.clientX - panStartX;
    offsetY += e.clientY - panStartY;
    panStartX = e.clientX;
    panStartY = e.clientY;
    applyTransform();
    return;
  }

  // 涂抹
  if (isDrawing && mode === 'inpaint') {
    const p = screenToCanvas(e);
    drawLine(lastX, lastY, p.x, p.y);
    lastX = p.x; lastY = p.y;
    return;
  }

  // 矩形框选
  if (rectDrawing && mode === 'rect') {
    const p = screenToCanvas(e);
    rectEnd = { x: p.x, y: p.y };
    drawRectOverlay();
    return;
  }
});

viewport.addEventListener('mouseleave', () => { brushCursor.style.display = 'none'; });
window.addEventListener('mouseup', e => {
  if (isPanning) {
    isPanning = false;
    viewport.style.cursor = mode === 'none' ? 'grab' : 'crosshair';
  }
  if (isDrawing) {
    isDrawing = false;
  }
  if (rectDrawing) {
    rectDrawing = false;
    // 矩形框选完成后，填充遮罩
    if (rectStart && rectEnd) {
      const x = Math.min(rectStart.x, rectEnd.x);
      const y = Math.min(rectStart.y, rectEnd.y);
      const w = Math.abs(rectEnd.x - rectStart.x);
      const h = Math.abs(rectEnd.y - rectStart.y);
      if (w > 2 && h > 2) {
        maskCtx.fillStyle = '#fff';
        maskCtx.fillRect(x, y, w, h);
        hasMask = true;
      }
    }
    drawRectOverlay();
  }
});

viewport.addEventListener('contextmenu', e => e.preventDefault());

function updateBrushCursorSize() {
  if (mode !== 'inpaint') return;
  const size = parseInt(document.getElementById('brushSize').value) * scale;
  brushCursor.style.width = size + 'px';
  brushCursor.style.height = size + 'px';
}

// ═══════════════════════════════════════
//  遮罩绘制
// ═══════════════════════════════════════
function drawMask(x, y) {
  const size = parseInt(document.getElementById('brushSize').value);
  maskCtx.fillStyle = '#fff';
  maskCtx.beginPath();
  maskCtx.arc(x, y, size/2, 0, Math.PI*2);
  maskCtx.fill();
  hasMask = true;
}

function drawLine(x1, y1, x2, y2) {
  const size = parseInt(document.getElementById('brushSize').value);
  maskCtx.strokeStyle = '#fff';
  maskCtx.lineWidth = size;
  maskCtx.lineCap = 'round';
  maskCtx.beginPath();
  maskCtx.moveTo(x1, y1);
  maskCtx.lineTo(x2, y2);
  maskCtx.stroke();
  hasMask = true;
}

function drawRectOverlay() {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  if (rectStart && rectEnd) {
    const x = Math.min(rectStart.x, rectEnd.x);
    const y = Math.min(rectStart.y, rectEnd.y);
    const w = Math.abs(rectEnd.x - rectStart.x);
    const h = Math.abs(rectEnd.y - rectStart.y);
    // 半透明蓝色填充
    overlayCtx.fillStyle = 'rgba(0,122,204,0.3)';
    overlayCtx.fillRect(x, y, w, h);
    // 蓝色边框
    overlayCtx.strokeStyle = '#0078d4';
    overlayCtx.lineWidth = 2 / scale;
    overlayCtx.strokeRect(x, y, w, h);
  }
}

// ═══════════════════════════════════════
//  去水印 API调用
// ═══════════════════════════════════════
async function doInpaint() {
  if (!originalImageData) { alert('请先打开图片'); return; }
  if (!hasMask) { alert('请先涂抹或框选要去除的区域'); return; }
  const alg = document.getElementById('inpaintAlg').value;
  const radius = parseInt(document.getElementById('inpaintRadius').value) || 3;

  const mainBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  const maskBlob = await new Promise(r => maskCanvas.toBlob(r, 'image/png'));
  const formData = new FormData();
  formData.append('image', mainBlob, 'image.png');
  formData.append('mask', maskBlob, 'mask.png');
  formData.append('algorithm', alg);
  formData.append('radius', radius);

  document.getElementById('hintInfo').textContent = '⏳ 正在处理...';
  try {
    const res = await fetch('/api/image-inpaint', { method: 'POST', body: formData });
    const d = await res.json();
    if (d.成功) {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        hasMask = false;
        rectStart = null; rectEnd = null;
        pushHistory();
        document.getElementById('hintInfo').textContent = `✅ 去水印完成 (${alg}, 半径${radius})`;
      };
      img.src = 'data:image/png;base64,' + d.图片;
    } else {
      alert('失败: ' + d.错误);
      document.getElementById('hintInfo').textContent = '❌ ' + d.错误;
    }
  } catch (e) {
    alert('请求失败: ' + e.message);
    document.getElementById('hintInfo').textContent = '❌ ' + e.message;
  }
}

// ═══════════════════════════════════════
//  亮度/对比度 (用CSS filter, GPU加速, 不卡)
// ═══════════════════════════════════════
let adjustBaseData = null;

function previewAdjust() {
  const b = parseInt(document.getElementById('brightness').value);
  const c = parseInt(document.getElementById('contrast').value);
  // brightness: 1.0 = 原始, 范围 0~2; contrast: 1.0 = 原始, 范围 0~2
  const brightnessVal = 1.0 + b / 100.0;
  const contrastVal = 1.0 + c / 100.0;
  canvas.style.filter = `brightness(${brightnessVal}) contrast(${contrastVal})`;
}

function applyAdjust() {
  const b = parseInt(document.getElementById('brightness').value);
  const c = parseInt(document.getElementById('contrast').value);
  if (b === 0 && c === 0) { canvas.style.filter = 'none'; return; }
  // 把filter烘焙到canvas像素
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  const brightnessVal = 1.0 + b / 100.0;
  const contrastVal = 1.0 + c / 100.0;
  tctx.filter = `brightness(${brightnessVal}) contrast(${contrastVal})`;
  tctx.drawImage(canvas, 0, 0);
  tctx.filter = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tmp, 0, 0);
  canvas.style.filter = 'none';
  pushHistory();
  document.getElementById('brightness').value = 0;
  document.getElementById('contrast').value = 0;
  document.getElementById('brightVal').textContent = '0';
  document.getElementById('contrastVal').textContent = '0';
  document.getElementById('hintInfo').textContent = '✅ 亮度对比度已应用';
}

// ═══════════════════════════════════════
//  灰度/模糊/旋转
// ═══════════════════════════════════════
function doGray() {
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = data.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
    d[i] = d[i+1] = d[i+2] = g;
  }
  ctx.putImageData(data, 0, 0);
  pushHistory();
  document.getElementById('hintInfo').textContent = '✅ 灰度化完成';
}

function doBlur() {
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  tmp.getContext('2d').drawImage(canvas, 0, 0);
  ctx.filter = 'blur(5px)';
  ctx.drawImage(tmp, 0, 0);
  ctx.filter = 'none';
  pushHistory();
  document.getElementById('hintInfo').textContent = '✅ 模糊完成';
}

function doRotate() {
  const angle = parseFloat(document.getElementById('rotateAngle').value) || 90;
  const rad = -angle * Math.PI / 180;
  const cos = Math.abs(Math.cos(rad));
  const sin = Math.abs(Math.sin(rad));
  const w = canvas.width, h = canvas.height;
  const nw = Math.round(w * cos + h * sin);
  const nh = Math.round(w * sin + h * cos);
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').drawImage(canvas, 0, 0);
  canvas.width = nw; canvas.height = nh;
  maskCanvas.width = nw; maskCanvas.height = nh;
  overlayCanvas.width = nw; overlayCanvas.height = nh;
  ctx.translate(nw/2, nh/2);
  ctx.rotate(rad);
  ctx.drawImage(tmp, -w/2, -h/2);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  pushHistory();
  fitCanvas();
  document.getElementById('hintInfo').textContent = `✅ 旋转${angle}°完成 (${nw}×${nh})`;
}

// ═══════════════════════════════════════
//  撤销/重做
// ═══════════════════════════════════════
function pushHistory() {
  history = history.slice(0, historyIdx + 1);
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (history.length > 20) history.shift();
  else historyIdx++;
}

function undo() {
  if (historyIdx <= 0) return;
  historyIdx--;
  ctx.putImageData(history[historyIdx], 0, 0);
  document.getElementById('hintInfo').textContent = '↩️ 已撤销';
}

function redo() {
  if (historyIdx >= history.length - 1) return;
  historyIdx++;
  ctx.putImageData(history[historyIdx], 0, 0);
  document.getElementById('hintInfo').textContent = '↪️ 已重做';
}

// ═══════════════════════════════════════
//  下载
// ═══════════════════════════════════════
function downloadResult() {
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'edited_' + Date.now() + '.png';
    a.click();
  }, 'image/png');
}

// ═══════════════════════════════════════
//  键盘快捷键
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); undo(); }
    if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); redo(); }
  }
});

// ═══════════════════════════════════════
//  URL参数加载图片
// ═══════════════════════════════════════
(function() {
  const params = new URLSearchParams(location.search);
  imgPath = params.get('path');
  if (!imgPath) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => setImage(img, imgPath.replace(/[\\/]/g,'/').split('/').pop());
  img.onerror = () => { document.getElementById('hintInfo').textContent = '图片加载失败，请手动打开'; };
  img.src = '/api/image?path=' + encodeURIComponent(imgPath);
})();
</script>
</body>
</html>
